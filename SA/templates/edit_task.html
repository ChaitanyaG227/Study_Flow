<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task - StudyFlow Architect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="dashboard-body">
    <div class="edit-task-container">
        <div class="card edit-card">
            <div class="card-header">
                <i class="fas fa-edit card-icon"></i>
                <h3>Edit Task</h3>
            </div>
            <div class="card-content">
                <form action="{{ url_for('edit_task', task_id=task.id) }}" method="POST" class="task-form">
                    <div class="form-group">
                        <label for="content">Task Description</label>
                        <input type="text" id="content" name="content" value="{{ task.content }}" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" value="{{ task.subject }}" required>
                    </div>
                    <div class="form-group-inline">
                        <div class="form-group" style="width: 50%;">
                            <label for="deadline">Deadline</label>
                            <input type="date" id="deadline" name="deadline" value="{{ task.deadline.strftime('%Y-%m-%d') }}" required>
                        </div>
                        <div class="form-group" style="width: 50%;">
                            <label for="estimated_hours">Estimated Hours</label>
                            <input type="number" step="0.5" id="estimated_hours" name="estimated_hours" value="{{ task.estimated_hours }}" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority" name="priority" required>
                            <option value="High" {% if task.priority == 'High' %}selected{% endif %}>High</option>
                            <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>Medium</option>
                            <option value="Low" {% if task.priority == 'Low' %}selected{% endif %}>Low</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <a href="{{ url_for('dashboard') }}" class="btn-secondary">Cancel</a>
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
