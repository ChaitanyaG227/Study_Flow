<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus: {{ task.content }} - StudyFlow Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .timer-circle {
            stroke-dasharray: 283; /* 2 * pi * 45 */
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>
<body class="bg-[#0d1a2e] text-white font-sans flex items-center justify-center h-screen">

    <div id="particles-js" class="absolute top-0 left-0 w-full h-full z-0"></div>

    <div class="relative z-10 text-center glass-card p-12 rounded-2xl w-full max-w-md mx-4">
        <a href="{{ url_for('dashboard') }}" class="absolute top-4 left-4 text-gray-400 hover:text-white transition">
            <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
        </a>

        <h3 id="session-type" class="text-2xl font-bold text-cyan-400 mb-2">Time to Focus!</h3>
        <p class="text-lg text-gray-300 mb-8">Task: <span class="font-semibold">{{ task.content }}</span></p>

        <div class="relative w-48 h-48 mx-auto mb-8">
            <svg class="absolute top-0 left-0 w-full h-full" viewBox="0 0 100 100">
                <circle class="text-gray-700" stroke-width="5" stroke="currentColor" fill="transparent" r="45" cx="50" cy="50" />
                <circle id="timer-progress" class="text-cyan-400 timer-circle" stroke-width="5" stroke-linecap="round" stroke="currentColor" fill="transparent" r="45" cx="50" cy="50" style="transform: rotate(-90deg); transform-origin: 50% 50%;" />
            </svg>
            <div id="timer-display" class="absolute top-0 left-0 w-full h-full flex items-center justify-center text-5xl font-bold">25:00</div>
        </div>

        <div class="flex justify-center space-x-4">
            <button id="start-pause-btn" class="px-8 py-3 rounded-md bg-cyan-500 hover:bg-cyan-600 transition text-lg font-semibold w-36">
                <i class="fas fa-play mr-2"></i>Start
            </button>
            <button id="reset-btn" class="px-8 py-3 rounded-md bg-gray-700/50 hover:bg-gray-700/80 transition text-lg font-semibold w-36">
                <i class="fas fa-sync-alt mr-2"></i>Reset
            </button>
        </div>
    </div>
    
<script src="{{ url_for('static', filename='js/pomodoro.js') }}" 
        data-task-id="{{ task.id }}" 
        data-log-url="{{ url_for('log_session') }}"
        data-work-min="{{ user_settings.pomodoro_work_minutes }}"
        data-short-break-min="{{ user_settings.pomodoro_short_break }}"
        data-long-break-min="{{ user_settings.pomodoro_long_break }}">
</script>
</body>
</html>
